name: Release

# Ein getaggter Commit (v*) löst einen kompletten Release-Build aus:
# bauen → signieren → GitHub-Release anlegen → latest.json hochladen.
# Installierte Apps holen sich das Update dann beim nächsten Start.
#
# Zwei Jobs:
#   desktop  — Windows-Installer + Updater-Artefakte (primäres Produkt).
#   android  — signierte arm64-APK, die an dasselbe Release gehängt wird.
#              Läuft nur, wenn das Keystore-Secret gesetzt ist; sonst wird
#              der Android-Teil sauber übersprungen (siehe DEPLOYMENT.md).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # nötig, damit die Action das Release anlegen darf

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Node einrichten
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Build cachen
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      # Stockfish wird nicht mit eingecheckt (GPL, Größe) und muss vor dem
      # Bundle in src-tauri/binaries/ liegen. Hier: aktuelles offizielles
      # Windows-AVX2-Release. Für ältere CPUs das Muster auf "sse41-popcnt"
      # o. Ä. ändern.
      - name: Stockfish holen (Windows, AVX2)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ "User-Agent" = "kiebitz-ci"; "Authorization" = "Bearer $env:GITHUB_TOKEN" }
          $rel = Invoke-RestMethod "https://api.github.com/repos/official-stockfish/Stockfish/releases/latest" -Headers $headers
          $asset = $rel.assets | Where-Object { $_.name -match "windows-x86-64-avx2.*\.zip$" } | Select-Object -First 1
          if (-not $asset) { throw "Kein Windows-AVX2-Stockfish-Asset gefunden" }
          Invoke-WebRequest $asset.browser_download_url -OutFile sf.zip
          Expand-Archive sf.zip -DestinationPath sf -Force
          $exe = Get-ChildItem sf -Recurse -Filter *.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item $exe.FullName src-tauri/binaries/stockfish.exe
          Write-Host "Stockfish gebündelt: $($asset.name)"

      - name: Bauen, signieren & Release veröffentlichen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signaturschlüssel für den Updater (Repo-Secret, siehe DEPLOYMENT.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kiebitz ${{ github.ref_name }}"
          releaseBody: "Automatically built from ${{ github.ref_name }}. Existing installations update on the next start."
          releaseDraft: false
          prerelease: false

  android:
    # Erst bauen, wenn das Desktop-Release (und damit der Release-Eintrag)
    # existiert — die APK wird an genau dieses Release gehängt.
    needs: desktop
    runs-on: ubuntu-latest
    env:
      # Android-Keystore als Base64-Secret (siehe DEPLOYMENT.md, One-time setup).
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      # Ohne Keystore-Secret kann keine installierbare (signierte) APK entstehen.
      # Dann den Android-Teil überspringen, statt das ganze Release rot zu färben.
      - name: Keystore vorhanden?
        id: guard
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANDROID_KEYSTORE_BASE64 ist nicht gesetzt — Android-APK wird übersprungen. Setup siehe docs/DEPLOYMENT.md."
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.has_keystore == 'true'

      - name: Node einrichten
        if: steps.guard.outputs.has_keystore == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: JDK 17 einrichten
        if: steps.guard.outputs.has_keystore == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Android-SDK/NDK einrichten
        if: steps.guard.outputs.has_keystore == 'true'
        uses: android-actions/setup-android@v4

      - name: NDK + Plattform installieren
        if: steps.guard.outputs.has_keystore == 'true'
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;28.2.13676358"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Rust + Android-Targets einrichten
        if: steps.guard.outputs.has_keystore == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust-Build cachen
        if: steps.guard.outputs.has_keystore == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - name: Frontend-Abhängigkeiten installieren
        if: steps.guard.outputs.has_keystore == 'true'
        run: npm ci

      # Stockfish für Android (arm64) als libstockfish.so in die jniLibs legen.
      # resolve_engine() findet sie im nativeLibraryDir der App. Plain armv8
      # (kein -dotprod) für breite CPU-Kompatibilität.
      - name: Stockfish holen (Android, armv8)
        if: steps.guard.outputs.has_keystore == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset=$(curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/official-stockfish/Stockfish/releases/latest" \
            | jq -r '.assets[] | select(.name == "stockfish-android-armv8.tar") | .browser_download_url')
          [ -n "$asset" ] || { echo "Kein stockfish-android-armv8.tar gefunden"; exit 1; }
          echo "Lade $asset"
          curl -sSL "$asset" -o sf.tar
          mkdir -p sf && tar -xf sf.tar -C sf
          bin=$(find sf -type f -name "stockfish-android-armv8" | head -n1)
          [ -n "$bin" ] || bin=$(find sf -type f -perm -u+x ! -name "*.txt" | head -n1)
          dest=src-tauri/gen/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$dest"
          cp "$bin" "$dest/libstockfish.so"
          echo "Stockfish gebündelt: $(basename "$bin") -> $dest/libstockfish.so"

      # Keystore aus dem Secret wiederherstellen und die von Gradle gelesene
      # keystore.properties erzeugen (beide sind gitignored).
      - name: Keystore einrichten
        if: steps.guard.outputs.has_keystore == 'true'
        run: |
          cd src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
          {
            echo "storeFile=keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      # Schnell scheitern, bevor der lange Build läuft. -certreq greift wirklich
      # auf den privaten Schlüssel zu und prüft damit Store- UND Key-Passwort
      # (genau der Mismatch, der sonst erst nach Minuten beim Signieren auffliegt)
      # sowie Alias und Keystore-Inhalt in einem Rutsch.
      - name: Keystore prüfen
        if: steps.guard.outputs.has_keystore == 'true'
        run: |
          cd src-tauri/gen/android
          if ! keytool -certreq -alias "$ANDROID_KEY_ALIAS" -keystore keystore.jks \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" -keypass "$ANDROID_KEY_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Keystore-Check fehlgeschlagen: Alias, Store- oder Key-Passwort passen nicht zum Keystore. ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD prüfen — bei PKCS12 (keytool-Default) müssen Store- und Key-Passwort identisch sein. Siehe docs/DEPLOYMENT.md."
            exit 1
          fi
          echo "Keystore ok: Alias '$ANDROID_KEY_ALIAS', Store- und Key-Passwort passen."

      - name: Android-APK bauen (release, arm64)
        if: steps.guard.outputs.has_keystore == 'true'
        run: npx tauri android build --apk --target aarch64

      # Signierte APK finden, versioniert umbenennen und ans Release hängen.
      - name: APK ans Release hängen
        if: steps.guard.outputs.has_keystore == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          apk=$(find src-tauri/gen/android -path "*/outputs/apk/*/release/*.apk" | head -n1)
          [ -n "$apk" ] || { echo "Keine Release-APK gefunden"; exit 1; }
          out="Kiebitz_${version}_arm64.apk"
          cp "$apk" "$out"
          echo "Lade $out ($(du -h "$out" | cut -f1)) zu Release ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" "$out" --clobber
